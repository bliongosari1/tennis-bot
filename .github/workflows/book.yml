name: Tennis Court Sniper

# ─── Triggers ────────────────────────────────────────────────────────────────
#
# GitHub cron is UTC.  Melbourne is AEDT (UTC+11, Oct–Apr) or AEST (UTC+10,
# Apr–Oct).  To cover both seasons without rewriting the workflow twice a
# year we list TWO cron entries (one per offset).  Only one fires "on time"
# at any given month; the other fires ~1 hour off and the scheduler's
# `--test-now` logic just sleeps a little longer.
#
# Day-of-week mapping (cron uses UTC day):
#   Evenings: booking weekday slots Wed–Sun Melbourne  →  same UTC day
#             (Wed=3, Thu=4, Fri=5, Sat=6, Sun=0)
#   Mornings: booking weekend slots Mon/Tue Melbourne  →  PREVIOUS UTC day
#             (Sun=0, Mon=1) because 8–9 AM Melb = 21–23 UTC the day before.
on:
  # Schedules disabled — Fly.io (fly_main.py) is the live scheduler.
  # Kept around for manual fallback via "Run workflow" if Fly is down.
  workflow_dispatch: {}

# ─── Environment ─────────────────────────────────────────────────────────────
env:
  TZ: Australia/Melbourne          # all datetime.now() calls use Melbourne time
  PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright

# ─── Job ─────────────────────────────────────────────────────────────────────
jobs:
  snipe:
    runs-on: ubuntu-latest
    timeout-minutes: 240            # safety cap (session is ~3.5 hours max)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: /home/runner/.cache/ms-playwright
          key: pw-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium + OS deps
        run: playwright install --with-deps chromium

      - name: Snipe tennis courts
        env:
          TW_EMAIL:             ${{ secrets.TW_EMAIL }}
          TW_PASSWORD:          ${{ secrets.TW_PASSWORD }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scheduler.py --test-now

      - name: Upload screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_id }}-${{ github.run_attempt }}
          path: "*.png"
          retention-days: 3

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: "*.log"
          retention-days: 7
